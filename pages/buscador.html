<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador - Hotel</title>
    <link rel="stylesheet" href="../assets/css/styles-mi-reserva-y-buscador.css">
</head>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("buscadorForm");

    if (form) {
        form.addEventListener("submit", function(event) {
            event.preventDefault();
            window.location.href = "habitaciones.html";
        });
    }

});
</script>


<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo"><img src="../assets/img/logo.png" alt="Green Paradise logo" class="logo-img">Green Paradise</h2>
            <ul class="nav-menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="habitaciones.html">Habitaciones</a></li>
                <li><a href="paquetes.html">Paquetes</a></li>
                <li><a href="buscador.html">Buscar</a></li>
                <li><a href="mi-reserva.html">Mis Reservas</a></li>
                <li><a href="checkin.html">Check-in</a></li>
                <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
                <li><a href="../login.html" class="btn-login">Iniciar Sesión</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <h1>Buscar Disponibilidad</h1>
        <form id="buscadorForm">
            <input type="date" id="checkIn" placeholder="Fecha de entrada" required>
            <input type="date" id="checkOut" placeholder="Fecha de salida" required>
            <input type="number" id="huespedes" placeholder="Número de huéspedes" required>
            <button type="submit">Buscar</button>
        </form>
        <div id="resultados"></div>
    </div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
